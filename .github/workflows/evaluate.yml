name: Evaluate Student Submission

on:
  workflow_call:
    secrets:
      LEADERBOARD_TOKEN:
        required: true
      SUBMIT_SECRET:
        required: true

jobs:
  evaluate:
    runs-on: ubuntu-latest

    steps:
      # ── Setup ───────────────────────────────────────────────────
      - name: Checkout student submission
        uses: actions/checkout@v4
        with:
          path: student

      - name: Checkout judge
        uses: actions/checkout@v4
        with:
          repository: ntu-rl-2026-spring2-hw3/hw3-2-judge-workflow
          path: judge

      - name: Extract student ID from meta.xml
        id: meta
        run: |
          student_id=$(python3 - <<'PYEOF'
          import sys, xml.etree.ElementTree as ET
          try:
              tree = ET.parse("student/meta.xml")
              val = tree.find("./info/name")
              if val is None or not val.text.strip():
                  raise ValueError
              print(val.text.strip())
          except FileNotFoundError:
              print("::error::meta.xml not found. Add a meta.xml file to your repo root (see README).", file=sys.stderr)
              sys.exit(1)
          except Exception:
              print("::error::meta.xml is malformed. Check that <info><name>your_id</name></info> is present.", file=sys.stderr)
              sys.exit(1)
          PYEOF
          )
          echo "student_id=$student_id" >> "$GITHUB_OUTPUT"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          if [ ! -f student/requirements.txt ]; then
            echo "::error::requirements.txt not found. Add a requirements.txt to your repo root (it can be empty if you have no extra dependencies)."
            exit 1
          fi
          pip install -r student/requirements.txt
          pip install numpy levdoom

      # ── Evaluation ──────────────────────────────────────────────
      - name: Run evaluation
        run: |
          python judge/judge.py --student-path student --output results.json || {
            echo "::error::Evaluation failed. Common causes:"
            echo "::error::  1. student_agent.py is missing — make sure it exists in your repo root."
            echo "::error::  2. StudentAgent class is not defined — your file must contain 'class StudentAgent'."
            echo "::error::  3. StudentAgent is missing act(self, obs) -> int."
            echo "::error::  4. An exception was raised in __init__ or act() — check the logs above for the traceback."
            exit 1
          }

      # ── Submit to leaderboard ────────────────────────────────────
      - name: Submit to leaderboard
        env:
          LEADERBOARD_TOKEN: ${{ secrets.LEADERBOARD_TOKEN }}
          SUBMIT_SECRET: ${{ secrets.SUBMIT_SECRET }}
        run: |
          python - <<'EOF'
          import json, os, urllib.request

          results = json.load(open("results.json"))

          payload = json.dumps({
              "event_type": "submit_score",
              "client_payload": {
                  "secret":     os.environ["SUBMIT_SECRET"],
                  "student_id": "${{ steps.meta.outputs.student_id }}",
                  "results":    results,
              }
          }).encode()

          req = urllib.request.Request(
              "https://api.github.com/repos/ntu-rl-2026-spring2-hw3/hw3-2-leaderboard/dispatches",
              data=payload,
              headers={
                  "Authorization": f"Bearer {os.environ['LEADERBOARD_TOKEN']}",
                  "Accept": "application/vnd.github.v3+json",
                  "Content-Type": "application/json",
              },
              method="POST",
          )
          with urllib.request.urlopen(req) as r:
              print(f"Submitted: HTTP {r.status}")
          EOF