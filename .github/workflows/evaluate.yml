name: Evaluate Student Submission

on:
  workflow_call:

jobs:
  evaluate:
    runs-on: self-hosted

    steps:
      # ── Setup ───────────────────────────────────────────────────
      - name: Checkout student submission
        uses: actions/checkout@v4
        with:
          path: student

      - name: Remove .git from student submission
        run: rm -rf student/.git

      - name: Checkout judge
        uses: actions/checkout@v4
        with:
          repository: ntu-rl-2026-spring2-hw3/hw3-2-judge-workflow
          path: judge

      - name: Extract student ID from meta.xml
        id: meta
        run: |
          student_id=$(python3 - <<'PYEOF'
          import sys, xml.etree.ElementTree as ET
          try:
              tree = ET.parse("student/meta.xml")
              val = tree.find("./info/name")
              if val is None or not val.text.strip():
                  raise ValueError
              print(val.text.strip())
          except FileNotFoundError:
              print("::error::meta.xml not found. Add a meta.xml file to your repo root (see README).", file=sys.stderr)
              sys.exit(1)
          except Exception:
              print("::error::meta.xml is malformed. Check that <info><name>your_id</name></info> is present.", file=sys.stderr)
              sys.exit(1)
          PYEOF
          )
          echo "student_id=$student_id" >> "$GITHUB_OUTPUT"

      - name: Check for template submission
        run: |
          if [ "${{ steps.meta.outputs.student_id }}" = "r00000001" ]; then
            echo "::error::Student ID is r00000001 — this is the template placeholder. Please update meta.xml with your real student ID before submitting."
            exit 1
          fi

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          if [ ! -f student/requirements.txt ]; then
            echo "::error::requirements.txt not found. Add a requirements.txt to your repo root (it can be empty if you have no extra dependencies)."
            exit 1
          fi
          uv venv --clear .venv
          echo "$GITHUB_WORKSPACE/.venv/bin" >> "$GITHUB_PATH"
          uv pip install --python .venv/bin/python -r student/requirements.txt
          uv pip install --python .venv/bin/python numpy==2.2.6 levdoom==1.0.3

      # ── Evaluation ──────────────────────────────────────────────
      - name: Run evaluation
        run: |
          python judge/judge.py --student-path student --output results.json || {
            echo "::error::Evaluation failed. Common causes:"
            echo "::error::  1. student_agent.py is missing — make sure it exists in your repo root."
            echo "::error::  2. StudentAgent class is not defined — your file must contain 'class StudentAgent'."
            echo "::error::  3. StudentAgent is missing act(self, obs) -> int."
            echo "::error::  4. An exception was raised in __init__ or act() — check the logs above for the traceback."
            exit 1
          }

      # ── Submit to leaderboard ────────────────────────────────────
      - name: Submit to leaderboard
        run: |
          python - <<'EOF'
          import json, os, urllib.request

          results = json.load(open("results.json"))

          payload = json.dumps({
              "event_type": "submit_score",
              "client_payload": {
                  "student_id": "${{ steps.meta.outputs.student_id }}",
                  "results":    results,
                  "audit": {
                      "repository": "${{ github.repository }}",
                      "run_id":     "${{ github.run_id }}",
                      "run_url":    "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}",
                      "sha":        "${{ github.sha }}",
                      "actor":      "${{ github.actor }}",
                  },
              }
          }).encode()

          class PostRedirectHandler(urllib.request.HTTPRedirectHandler):
              def redirect_request(self, req, fp, code, msg, headers, newurl):
                  return urllib.request.Request(
                      newurl, data=req.data, headers=dict(req.headers), method=req.method
                  )

          req = urllib.request.Request(
              "https://api.github.com/repos/ntu-rl-2026-spring2-hw3/hw3-2-leaderboard/dispatches",
              data=payload,
              headers={
                  "Authorization": f"Bearer {os.environ['LEADERBOARD_TOKEN']}",
                  "Accept": "application/vnd.github.v3+json",
                  "Content-Type": "application/json",
              },
              method="POST",
          )
          opener = urllib.request.build_opener(PostRedirectHandler)
          with opener.open(req) as r:
              print(f"Submitted: HTTP {r.status}")
          EOF
